<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - GitSocialHub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <h1 class="logo">GitSocialHub</h1>
      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="login.html">Se connecter</a>
      </nav>
    </div>
  </header>

  <main class="login-page">
    <section class="card login-card">
      <h2>Se connecter</h2>
      <p>Accède à ton espace GitSocialHub.</p>
      <form class="login-form">
        <label for="email">Adresse e-mail</label>
        <input id="email" name="email" type="email" placeholder="nom@exemple.com">

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="••••••••">

        <button class="button primary" type="submit">Connexion</button>
      </form>
    </section>
  </main>
</body>
</html>
